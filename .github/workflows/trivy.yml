name: Trivy SAST Scan

on:
  push:
    branches: [ "CI_CD" ]
  pull_request:

jobs:
  trivy-sast:
    name: Run Trivy Static Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
