name: CI-CD FastAPI Deployment

on:
  push:
    branches:
      # This workflow triggers only when you push to the CI_CD branch
      - CI_CD

jobs:

  # ---------------- CI JOB: RUN TESTS ----------------
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Assuming requirements.txt is at the root of the repo
          pip install -r requirements.txt

      - name: Run tests
        # The --maxfail=1 ensures the job stops immediately upon the first test failure
        run: |
          pytest --maxfail=1 --disable-warnings -q


  # ---------------- CD JOB: DEPLOY TO EC2 ----------------
  deploy:
    runs-on: ubuntu-latest
    # Deployment only runs if the 'test' job succeeded
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Add SSH Key to Agent
      - name: Add SSH key and update Known Hosts
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Your EC2 Private Key
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
          # Prevents 'Host key verification failed' errors. Add the public host key of your EC2.
          known-hosts: ${{ secrets.EC2_HOST }} 

      # 2. Deploy to EC2 via SSH
      - name: Deploy to EC2
        run: |
          # -A: Enables SSH agent forwarding to use the key added above
          # -o StrictHostKeyChecking=no is a failsafe, but using known-hosts above is preferred
          ssh -A -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          
          # Change to the application directory on the remote server
          cd ${{ secrets.EC2_DIR }}

          echo "Pulling latest backend code..."
          git pull origin CI_CD

          echo "Updating .env file with secrets..."
          # Use a quoted Here Document (<<'EOT') to ensure the secrets are written literally 
          # as evaluated by the GitHub Actions runner, preventing shell misinterpretation.
          cat > .env <<'EOT'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}

          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}

          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_FULL_NAME=${{ secrets.ADMIN_FULL_NAME }}

          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
          MAIL_SERVER=${{ secrets.MAIL_SERVER }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_TLS=${{ secrets.MAIL_TLS }}
          MAIL_SSL=${{ secrets.MAIL_SSL }}

          FRONTEND_RESET_URL=${{ secrets.FRONTEND_RESET_URL }}

          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          EOT

          echo "Installing Python dependencies and activating venv..."
          # Check if venv exists; activate it or create it for a robust deployment
          if [ -d "venv" ]; then
            source venv/bin/activate
          else
            echo "Virtual environment not found. Creating and activating..."
            python3 -m venv venv
            source venv/bin/activate
          fi
          
          # Re-install or upgrade dependencies in case requirements.txt changed
          pip install -r requirements.txt --upgrade

          echo "Applying database migrations (Alembic upgrade)..."
          # Run Alembic migrations to update the database schema
          alembic upgrade head
          
          echo "Restarting FastAPI service via Systemd..."
          # Requires the 'ubuntu' user to have passwordless sudo configured for this command
          sudo systemctl restart fastapi
          
          echo "Deployment complete."
          EOF