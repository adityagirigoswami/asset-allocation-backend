name: CI-CD FastAPI Deployment

on:
  push:
    branches:
      - CI_CD

jobs:

  # ---------------- CI JOB: RUN TESTS ----------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q


  # ---------------- CD JOB: DEPLOY TO EC2 ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
cd ${{ secrets.EC2_DIR }}

echo "Pulling latest backend code..."
git pull origin CI_CD

echo "Creating .env file..."
cat <<EOT > .env
POSTGRES_USER=${{ secrets.POSTGRES_USER }}
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
POSTGRES_DB=${{ secrets.POSTGRES_DB }}
POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}

JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}
ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}

ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
ADMIN_FULL_NAME=${{ secrets.ADMIN_FULL_NAME }}

MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
MAIL_FROM=${{ secrets.MAIL_FROM }}
MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
MAIL_SERVER=${{ secrets.MAIL_SERVER }}
MAIL_PORT=${{ secrets.MAIL_PORT }}
MAIL_TLS=${{ secrets.MAIL_TLS }}
MAIL_SSL=${{ secrets.MAIL_SSL }}

FRONTEND_RESET_URL=${{ secrets.FRONTEND_RESET_URL }}

CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
EOT

echo "Installing Python dependencies..."
source venv/bin/activate
pip install -r requirements.txt

echo "Restarting FastAPI service..."
sudo systemctl restart fastapi
EOF
